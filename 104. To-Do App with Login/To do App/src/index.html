<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>To-Do App</title>
</head>
<body>
    <div class="app">
        <header class="app__header">
            <h1>To-Do App</h1>
            <p class="app__tagline">Stay organized on any screen size</p>
        </header>

        <main class="app__body">
            <section class="card" id="authCard">
                <h2 class="card__title">Login</h2>
                <form id="loginForm" class="form">
                    <label class="input">
                        <span class="input__label">Username</span>
                        <input type="text" id="username" placeholder="Enter username" required>
                    </label>
                    <label class="input">
                        <span class="input__label">Password</span>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </label>
                    <button type="submit" class="btn btn--primary">Login</button>
                </form>
            </section>

            <section class="card hidden" id="todoContainer">
                <div class="card__title-row">
                    <h2 class="card__title">Your Tasks</h2>
                    <button type="button" class="btn btn--ghost" id="logoutBtn">Logout</button>
                </div>

                <form id="taskForm" class="input-row">
                    <input type="text" id="newTask" placeholder="Add a new task" autocomplete="off">
                    <button id="addTask" class="btn btn--primary" type="submit">Add Task</button>
                </form>

                <ul id="taskList" class="tasks"></ul>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
