<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - E-Commerce</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="wrapper">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo">
                    <h1>🛒 TechStore</h1>
                </div>
                <div class="nav-menu">
                    <button class="nav-btn" onclick="showSection('products')">Shop</button>
                    <button class="nav-btn cart-btn" onclick="showSection('cart')">
                        Cart <span class="cart-count" id="cartCount">0</span>
                    </button>
                    <button class="nav-btn" onclick="showSection('orders')">Orders</button>
                </div>
            </div>
        </nav>

        <!-- Main Container -->
        <div class="container">
            <!-- Products Section -->
            <section id="products" class="section active">
                <div class="section-header">
                    <h2>Our Products</h2>
                    <div class="filter-container">
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="search-box"
                            placeholder="🔍 Search products..."
                            onkeyup="filterProducts()"
                        >
                        <select id="categoryFilter" class="filter-select" onchange="filterProducts()">
                            <option value="">All Categories</option>
                            <option value="laptops">Laptops</option>
                            <option value="phones">Phones</option>
                            <option value="accessories">Accessories</option>
                        </select>
                    </div>
                </div>
                <div id="productsList" class="products-grid">
                    <!-- Products will be loaded here -->
                </div>
            </section>

            <!-- Shopping Cart Section -->
            <section id="cart" class="section">
                <div class="section-header">
                    <h2>Shopping Cart</h2>
                </div>
                <div id="cartContainer" class="cart-container">
                    <div id="emptyCart" class="empty-message">
                        <p>Your cart is empty</p>
                        <button class="btn btn-primary" onclick="showSection('products')">Continue Shopping</button>
                    </div>
                    <div id="cartContent" style="display:none;">
                        <div id="cartItems" class="cart-items">
                            <!-- Cart items will be loaded here -->
                        </div>
                        <div class="cart-summary">
                            <div class="summary-row">
                                <span>Subtotal:</span>
                                <span id="subtotal">$0.00</span>
                            </div>
                            <div class="summary-row">
                                <span>Tax (10%):</span>
                                <span id="tax">$0.00</span>
                            </div>
                            <div class="summary-row total">
                                <span>Total:</span>
                                <span id="total">$0.00</span>
                            </div>
                            <button class="btn btn-success" onclick="checkout()">Proceed to Checkout</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Orders Section -->
            <section id="orders" class="section">
                <div class="section-header">
                    <h2>My Orders</h2>
                </div>
                <div id="ordersList" class="orders-list">
                    <p class="empty-message">No orders yet</p>
                </div>
            </section>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 TechStore. All rights reserved. | No payment required - Demo Store</p>
        </footer>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-body">
                <img id="modalImage" src="" alt="" class="modal-image">
                <div class="modal-details">
                    <h2 id="modalName"></h2>
                    <p id="modalDescription" class="product-description"></p>
                    <div class="modal-specs">
                        <p><strong>Category:</strong> <span id="modalCategory"></span></p>
                        <p><strong>In Stock:</strong> <span id="modalStock"></span></p>
                        <p><strong>Price:</strong> <span id="modalPrice" class="price"></span></p>
                    </div>
                    <div class="quantity-selector">
                        <label>Quantity:</label>
                        <input type="number" id="quantityInput" min="1" value="1">
                    </div>
                    <button class="btn btn-primary" onclick="addToCartFromModal()">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content modal-checkout">
            <span class="close" onclick="closeCheckout()">&times;</span>
            <h2>Checkout</h2>
            <form id="checkoutForm">
                <div class="form-group">
                    <label>Full Name:</label>
                    <input type="text" id="fullName" required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Address:</label>
                    <input type="text" id="address" required>
                </div>
                <div class="form-group">
                    <label>City:</label>
                    <input type="text" id="city" required>
                </div>
                <div class="form-group">
                    <label>Zip Code:</label>
                    <input type="text" id="zipCode" required>
                </div>
                <div class="checkout-total">
                    <h3>Total: <span id="checkoutTotal">$0.00</span></h3>
                </div>
                <button type="submit" class="btn btn-success">Place Order</button>
                <button type="button" class="btn btn-secondary" onclick="closeCheckout()">Cancel</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
